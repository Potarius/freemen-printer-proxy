version: '3.8'

services:
  freemen-printer-proxy:
    build: .
    container_name: freemen-printer-proxy
    restart: unless-stopped
    ports:
      - "6500:6500"
    environment:
      - NODE_ENV=production
      - PORT=6500
      - API_KEY=${API_KEY:?API_KEY must be set in .env file}
      - PRINTER_IP=${PRINTER_IP:-}
      - PRINTER_PORT=${PRINTER_PORT:-9100}
      - PRINTER_PROTOCOL=${PRINTER_PROTOCOL:-jetdirect}
      - SCAN_SUBNET=${SCAN_SUBNET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - freemen-printer-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  freemen-printer-proxy:
    driver: bridge
